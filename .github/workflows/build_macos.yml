name: Build and Test on macOS

on: [push, pull_request]

jobs:
  build-macos:

    name: py${{ matrix.python-version }}_cc=${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CC: ${{ matrix.compiler }}
    strategy:
      matrix:
        os: ["macos-latest",]
        compiler: ["gcc-14"]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12","3.13","3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install macOS Dependencies
      run: |
        brew install jasper libpng libaec
        brew tap eengl/nceplibs
        brew install nceplibs-g2c nceplibs-ip
        echo "G2C_DIR=$(brew --prefix nceplibs-g2c)" >> $GITHUB_ENV
        echo "IP_DIR=$(brew --prefix nceplibs-ip)" >> $GITHUB_ENV

    - name: Install python dependencies via pip
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install --upgrade setuptools
        python3 -m pip install --upgrade wheel
        if [ "${{ matrix.python-version }}" = "3.8" ] || [ "${{ matrix.python-version }}" = "3.9" ] || [ "${{ matrix.python-version }}" = "3.10" ]; then
          python3 -m pip install .
        else
          python3 -m pip install ".[all]"
        fi
        python3 -m pip install numcodecs fsspec hypothesis

    - name: Install grib2io and test
      run: |
        python --version
        pip install .
        python -c "import grib2io; grib2io.show_config()"
        pytest ./tests/
